<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4F7BF7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="KET单词" />
  <meta name="description" content="KET 单词滚动复习系统 — 间隔重复，科学记词" />

  <title>KET 单词复习</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <!-- 设计令牌（全局变量） -->
  <link rel="stylesheet" href="../shared/design-tokens.css" />
  <!-- 应用样式 -->
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- ==================== 顶部标题栏 ==================== -->
  <header class="app-header" id="appHeader">
    <a href="/" class="btn-icon header-home" aria-label="返回主页">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </a>
    <button class="btn-icon header-back hidden" id="btnBack" aria-label="返回">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <h1 class="header-title" id="headerTitle">KET 单词复习</h1>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <!-- ==================== 页面容器 ==================== -->
  <main class="page-container" id="pageContainer">

    <!-- 首页 -->
    <section class="page" id="pageHome" data-page="home">
      <!-- 由 app.js 动态渲染 -->
    </section>

    <!-- 今日任务 / 练习页 -->
    <section class="page hidden" id="pagePractice" data-page="practice">
    </section>

    <!-- 单词本 -->
    <section class="page hidden" id="pageWords" data-page="words">
    </section>

    <!-- 录入单词 -->
    <section class="page hidden" id="pageImport" data-page="import">
    </section>

    <!-- 错词本 -->
    <section class="page hidden" id="pageErrors" data-page="errors">
    </section>

    <!-- 统计 -->
    <section class="page hidden" id="pageStats" data-page="stats">
    </section>

    <!-- 设置 -->
    <section class="page hidden" id="pageSettings" data-page="settings">
    </section>

  </main>

  <!-- ==================== 底部导航 ==================== -->
  <nav class="bottom-nav" id="bottomNav" aria-label="主导航">
    <button class="nav-item active" data-route="/" aria-label="首页">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span class="nav-label">首页</span>
    </button>
    <button class="nav-item" data-route="/words" aria-label="单词本">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span class="nav-label">单词本</span>
    </button>
    <button class="nav-item" data-route="/import" aria-label="录入">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span class="nav-label">录入</span>
    </button>
    <button class="nav-item" data-route="/stats" aria-label="统计">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span class="nav-label">统计</span>
    </button>
    <button class="nav-item" data-route="/settings" aria-label="设置">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="nav-label">设置</span>
    </button>
  </nav>

  <!-- ==================== 全局 Toast 通知 ==================== -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ==================== 全局加载遮罩 ==================== -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- ==================== SW 更新提示 ==================== -->
  <div class="sw-update-banner hidden" id="swUpdateBanner">
    <span>发现新版本，刷新后生效</span>
    <button class="btn-sm btn-primary" id="btnSwUpdate">立即刷新</button>
    <button class="btn-icon" id="btnSwDismiss" aria-label="稍后">✕</button>
  </div>

  <!-- ==================== 脚本 ==================== -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
